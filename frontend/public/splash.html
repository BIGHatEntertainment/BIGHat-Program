<!doctype html>
<!--
  BIG Hat Entertainment — Tauri splash screen.

  Shown while the Rust shell waits for the bundled Python backend's
  /health endpoint to start responding. The Rust setup() block calls
  `window.location.replace('http://127.0.0.1:<port>/')` once the
  backend is healthy, replacing this splash with the full React app.

  Keep this file SELF-CONTAINED — no external scripts, no fetches, no
  axios. If the backend never starts, this page is the user's last
  diagnostic surface.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BIG Hat Entertainment</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000e2a;
      color: #efe8d9;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
    }

    /* ----- Chromeless title bar (matches React TitleBar.jsx contract) ----- */
    .titlebar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, #0a1428 0%, #07112a 100%);
      border-bottom: 1px solid rgba(251, 221, 104, 0.18);
      z-index: 10;
      user-select: none;
      -webkit-app-region: drag;
      app-region: drag;
    }
    .titlebar__brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      pointer-events: none;
    }
    .titlebar__brand img { width: 20px; height: 20px; }
    .titlebar__brand span {
      font-family: 'Anton', 'Impact', sans-serif;
      font-size: 12px;
      letter-spacing: 2.5px;
      color: #fbdd68;
      text-transform: uppercase;
    }
    .titlebar__controls {
      display: flex;
      height: 100%;
      -webkit-app-region: no-drag;
      app-region: no-drag;
    }
    .titlebar__btn {
      width: 46px;
      height: 36px;
      background: transparent;
      border: 0;
      color: #cfd6e8;
      cursor: pointer;
      transition: background 0.12s ease, color 0.12s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .titlebar__btn:hover { background: rgba(251, 221, 104, 0.12); color: #fbdd68; }
    .titlebar__btn--close:hover { background: #d92638; color: #fff; }

    /* ----- Stage ----- */
    .stage {
      position: absolute;
      inset: 36px 0 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 32px;
      background:
        radial-gradient(circle at 20% 20%, rgba(251,221,104,0.06), transparent 60%),
        radial-gradient(circle at 80% 80%, rgba(89,115,247,0.10), transparent 55%),
        #000e2a;
    }
    .logo {
      width: 140px;
      height: 140px;
      filter: drop-shadow(0 8px 24px rgba(251,221,104,0.25));
      animation: pulse 2.4s ease-in-out infinite;
    }
    .wordmark {
      font-family: 'Anton', 'Impact', sans-serif;
      font-size: 56px;
      letter-spacing: 4px;
      color: #fbdd68;
      margin: 0;
      text-shadow: 0 4px 18px rgba(0,0,0,0.45);
    }
    .tagline {
      font-size: 13px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #8892b0;
      margin: 0;
    }
    .progress {
      width: 260px;
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }
    .progress::after {
      content: '';
      position: absolute;
      inset: 0;
      width: 40%;
      background: linear-gradient(90deg, transparent, #fbdd68, transparent);
      animation: slide 1.6s ease-in-out infinite;
      border-radius: 999px;
    }
    #splash-status {
      font-size: 12px;
      color: #8892b0;
      letter-spacing: 1px;
      min-height: 16px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.85; }
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(250%); }
    }
  </style>
</head>
<body>
  <div class="titlebar" data-tauri-drag-region>
    <div class="titlebar__brand" data-tauri-drag-region>
      <img src="/hat-logo.png" alt="" draggable="false" />
      <span>BIG HAT ENTERTAINMENT</span>
    </div>
    <div class="titlebar__controls">
      <button class="titlebar__btn" id="btn-min" aria-label="Minimize" title="Minimize">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="1" y="4.5" width="8" height="1" fill="currentColor"/></svg>
      </button>
      <button class="titlebar__btn" id="btn-max" aria-label="Maximize" title="Maximize">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor"/></svg>
      </button>
      <button class="titlebar__btn titlebar__btn--close" id="btn-close" aria-label="Close" title="Close">
        <svg width="10" height="10" viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.2"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>
  <div class="stage" role="status" aria-live="polite">
    <img class="logo" src="/hat-logo.png" alt="BIG Hat" />
    <div>
      <p class="wordmark">BIG HAT</p>
      <p class="tagline">Entertainment Host Console</p>
    </div>
    <div class="progress" aria-hidden="true"></div>
    <p id="splash-status">Starting up…</p>
  </div>
  <script>
    // Wire window controls — uses the Tauri 2.x global exposed by withGlobalTauri=true.
    (function() {
      function getWin() {
        const w = window.__TAURI__;
        if (!w) return null;
        return (w.window && w.window.getCurrentWindow && w.window.getCurrentWindow())
            || (w.getCurrentWindow && w.getCurrentWindow())
            || null;
      }
      function safe(fn) {
        return function() {
          const win = getWin();
          if (!win) return;
          try { fn(win); } catch (e) { /* swallow */ }
        };
      }
      document.getElementById('btn-min').addEventListener('click', safe(w => w.minimize()));
      document.getElementById('btn-max').addEventListener('click', safe(w => w.toggleMaximize()));
      document.getElementById('btn-close').addEventListener('click', safe(w => w.close()));
    })();
  </script>
</body>
</html>
