name: Release Tauri builds

# Triggers on:
#   - Any tag starting with v32, e.g. v32.0.0
#   - Manual dispatch from the Actions UI (handy for dry-running the workflow
#     against a branch without cutting a real release)
on:
  push:
    tags:
      - 'v32.*'
      - 'v33.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag the release (e.g. 32.0.0)'
        required: true
        type: string
      draft:
        description: 'Create the release as a draft'
        required: false
        default: 'true'
        type: string

permissions:
  contents: write   # required to create/update GitHub Releases

jobs:
  build-tauri:
    name: ${{ matrix.label }}
    timeout-minutes: 75    # any leg stuck > 75 min (incl. queued-waiting-for-runner) auto-fails so a stuck macos-13 runner can't tie up a release indefinitely
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows (x86_64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - label: macOS (Apple Silicon)
            os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg,app
          - label: macOS (Intel)
            os: macos-13
            target: x86_64-apple-darwin
            bundles: dmg,app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"

      - name: Sync VERSION.txt and tauri.conf.json
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          echo "$V" > backend/VERSION.txt
          # Patch the Tauri config so the bundle metadata matches the tag.
          python -c "
          import json, pathlib
          p = pathlib.Path('src-tauri/tauri.conf.json')
          c = json.loads(p.read_text())
          c['version'] = '$V'
          p.write_text(json.dumps(c, indent=2))
          "
          cat backend/VERSION.txt
          python -c "import json; print('tauri version:', json.load(open('src-tauri/tauri.conf.json'))['version'])"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.target }}

      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build frontend (relative URLs)
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ''
          # GitHub Actions sets CI=true, which makes CRA treat ALL warnings
          # (including react-hooks/exhaustive-deps, which we've intentionally
          # downgraded to warnings) as errors. Unset it for the build step
          # only. Real undefined-reference bugs are still pinned as hard
          # errors by frontend/craco.config.js — see CHANGELOG v31.0.15.
          CI: ''
        run: yarn build

      - name: Freeze Python sidecar via PyInstaller
        env:
          # `emergentintegrations` (Emergent's LLM SDK used by the Story
          # Generator) is hosted on a private CDN — not on public PyPI.
          # The dev container has this URL pinned in pip.conf; GitHub
          # runners don't, so set it explicitly here.
          PIP_EXTRA_INDEX_URL: https://d33sy5i8bnduwe.cloudfront.net/simple/
        run: python scripts/build_sidecar.py --target ${{ matrix.target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple Developer ID cert yet — `-` triggers ad-hoc signing,
          # which lets the .app + .dmg bundle without erroring. Users will
          # still see the Gatekeeper warning on first launch (right-click
          # → Open). Real signing + notarization is a future task; needs
          # APPLE_CERTIFICATE / APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
          # secrets to land in repo Actions settings first.
          APPLE_SIGNING_IDENTITY: '-'
        with:
          tagName: v${{ steps.ver.outputs.version }}
          releaseName: 'BIG Hat Entertainment v${{ steps.ver.outputs.version }}'
          releaseBody: |
            Native Tauri desktop builds.

            - Windows: `BIGHatEntertainment-Setup-${{ steps.ver.outputs.version }}.exe`
            - macOS (Apple Silicon): `BIGHatEntertainment-${{ steps.ver.outputs.version }}_aarch64.dmg`
            - macOS (Intel): `BIGHatEntertainment-${{ steps.ver.outputs.version }}_x64.dmg`

            See CHANGELOG.md for the full notes.
          # Always create as draft. The verify-release-assets gate job that
          # runs after the matrix is the ONLY place in the entire pipeline
          # that flips a release public — and only after confirming all 3
          # OS installers are attached. This closes the race window where
          # a customer could briefly see a half-baked release between
          # tauri-action upload and the verification gate.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

  # -------------------------------------------------------------------------
  # Gate job: runs AFTER the matrix and refuses to let an incomplete release
  # be visible to customers. If any of (Windows .exe, macOS Apple Silicon
  # .dmg, macOS Intel .dmg) is missing from the release at this tag, the job
  # fails LOUDLY — customers never see the half-baked release because
  # tauri-action's draft toggle is honored on miss (or the release is
  # explicitly demoted back to draft by this job on partial uploads).
  # -------------------------------------------------------------------------
  verify-release-assets:
    name: Verify release assets are complete
    needs: build-tauri
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V"     >> "$GITHUB_OUTPUT"

      - name: Verify all 3 OS installers uploaded
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Looking up release for tag $TAG..."
          REL=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}")
          REL_ID=$(echo "$REL" | python -c "import sys,json;print(json.load(sys.stdin).get('id',''))")
          if [ -z "$REL_ID" ]; then
            echo "::error::No release found at $TAG. The matrix legs may have all failed before tauri-action could create the release."
            exit 1
          fi
          ASSETS=$(echo "$REL" | python -c "import sys,json;print('\n'.join(a['name'] for a in json.load(sys.stdin).get('assets',[])))")
          echo "Assets currently on release:"
          echo "$ASSETS" | sed 's/^/  /'

          MISSING=()
          # We don't care about the exact byte-for-byte file name, just that
          # one .exe for windows + one .dmg per mac arch is present.
          echo "$ASSETS" | grep -Eqi 'BIG.*Hat.*Entertainment.*Setup.*\.exe$|BIG.*Hat.*Entertainment.*\.exe$' || MISSING+=("windows-setup.exe")
          echo "$ASSETS" | grep -Eqi 'aarch64.*\.dmg$|arm64.*\.dmg$'                                              || MISSING+=("macos-apple-silicon.dmg")
          echo "$ASSETS" | grep -Eqi 'x64.*\.dmg$|x86_64.*\.dmg$|intel.*\.dmg$'                                   || MISSING+=("macos-intel.dmg")

          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "::error::Release $TAG is INCOMPLETE — missing: ${MISSING[*]}. Demoting back to draft so customers cannot see a half-baked release."
            curl -sS -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${REL_ID}" \
              -d '{"draft":true}' >/dev/null
            echo "Release demoted to draft. Inspect the failed matrix legs above, fix the root cause, re-run failed jobs (or cut a new tag), and only re-publish once all 3 binaries are present."
            exit 1
          fi
          echo "All 3 OS binaries present. Release $TAG is publishable."

          # Force the release to be PUBLIC (not draft, not prerelease). This
          # is the only place a release transitions from build-in-progress to
          # customer-visible — every other path is fail-closed.
          curl -sS -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${REL_ID}" \
            -d '{"draft":false,"prerelease":false,"make_latest":"true"}' >/dev/null
          echo "Release $TAG published publicly."
