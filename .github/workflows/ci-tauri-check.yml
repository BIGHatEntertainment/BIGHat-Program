name: CI — Tauri compile check

# Lightweight pre-release gate: every push to main runs a fast `cargo check`
# for ALL THREE Tauri release targets. If the Rust code doesn't compile for
# any of them, this fails BEFORE auto-tag.yml ever fires release.yml. That
# means a broken Rust commit can't sneak through to a half-baked GitHub
# Release (the kind that ships the macOS .dmg only because the Windows leg
# blew up at compile time). See PRD.md "RELEASE PIPELINE MUST BE FAIL-CLOSED".
#
# `cargo check` is ~5x faster than `cargo build` because it skips codegen.
# We don't actually build artifacts here — only the typechecker runs. Plenty
# fast enough to gate every commit.

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src-tauri/**'
      - '.github/workflows/ci-tauri-check.yml'
  pull_request:
    paths:
      - 'src-tauri/**'

jobs:
  cargo-check:
    name: cargo check (${{ matrix.target }})
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: check-${{ matrix.target }}

      # tauri build pulls feature flags from tauri.conf.json and needs Node
      # for frontend dist, but `cargo check` works against the Rust crate in
      # isolation IF we point it at the manifest. We don't need a frontend
      # build for typecheck.
      - name: cargo check
        working-directory: src-tauri
        run: cargo check --target ${{ matrix.target }} --locked --all-targets
